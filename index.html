<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simi 听力播放器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=ZCOOL+KuaiLe&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-1: #ffe5f1;
        --bg-2: #fff7d9;
        --card: #fff9ff;
        --ink: #4f2f5f;
        --primary: #ff4f8b;
        --primary-2: #ff7eb2;
        --accent: #2ec4b6;
        --chip: #f7d2e8;
        --chip-active: #ff8fbe;
        --line: #f5b6d4;
        --shadow: 0 14px 36px rgba(255, 79, 139, 0.22);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Baloo 2", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(
            circle at 10% 20%,
            #ffd2ea 0%,
            rgba(255, 210, 234, 0) 40%
          ),
          radial-gradient(
            circle at 90% 80%,
            #ffd88f 0%,
            rgba(255, 216, 143, 0) 32%
          ),
          linear-gradient(160deg, var(--bg-1), var(--bg-2));
        display: grid;
        place-items: center;
        padding: 20px;
      }

      .player {
        width: min(920px, 100%);
        background: linear-gradient(180deg, #fffdf6, var(--card));
        border: 3px solid #fff;
        border-radius: 28px;
        box-shadow: var(--shadow);
        padding: 24px;
      }

      h1 {
        margin: 0;
        font-family: "ZCOOL KuaiLe", "Baloo 2", cursive;
        font-size: clamp(1.8rem, 3vw, 2.5rem);
        color: var(--primary);
        text-align: center;
        letter-spacing: 1px;
      }

      .hint {
        margin: 8px 0 20px;
        text-align: center;
        font-size: 1.03rem;
        font-weight: 600;
      }

      .list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
        margin-bottom: 20px;
      }

      .track-btn {
        border: 2px solid transparent;
        border-radius: 16px;
        background: var(--chip);
        color: var(--ink);
        font-size: 1rem;
        font-weight: 700;
        padding: 10px 12px;
        min-height: 58px;
        cursor: pointer;
        transition: 0.2s ease;
        text-align: left;
      }

      .track-btn:hover {
        transform: translateY(-1px);
        border-color: #ffc3de;
      }

      .track-btn.active {
        background: var(--chip-active);
        color: #fff;
        border-color: #ff5d9b;
        box-shadow: 0 8px 20px rgba(255, 79, 139, 0.24);
      }

      .current {
        background: #fff;
        border: 2px dashed var(--line);
        border-radius: 14px;
        padding: 10px 14px;
        text-align: center;
        font-size: 1.07rem;
        font-weight: 700;
        margin-bottom: 16px;
        min-height: 56px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .main-controls {
        display: flex;
        justify-content: center;
        margin-bottom: 16px;
      }

      .play-toggle {
        border: none;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--primary), var(--primary-2));
        color: #fff;
        font-size: 1.35rem;
        font-weight: 800;
        padding: 16px 36px;
        min-width: 180px;
        min-height: 72px;
        cursor: pointer;
        box-shadow: 0 12px 24px rgba(255, 79, 139, 0.35);
        transition: transform 0.15s ease;
      }

      .play-toggle:active {
        transform: scale(0.98);
      }

      .jump-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 18px;
      }

      .jump-btn {
        border: none;
        border-radius: 14px;
        color: #fff;
        font-size: 1.02rem;
        font-weight: 700;
        min-height: 52px;
        cursor: pointer;
        box-shadow: 0 8px 16px rgba(255, 145, 107, 0.25);
      }

      .jump-btn.s20 {
        background: linear-gradient(135deg, #ff6a88, #ff8ba7);
      }

      .jump-btn.s10 {
        background: linear-gradient(135deg, #ff9f43, #ffbe63);
      }

      .jump-btn.s5 {
        background: linear-gradient(135deg, #36cfc9, #5de2d0);
      }

      .jump-btn.s3 {
        background: linear-gradient(135deg, #5f8bff, #7ea3ff);
      }

      .progress-wrap {
        background: #fff;
        border: 2px solid #ffe0ef;
        border-radius: 16px;
        padding: 12px 14px;
        margin-bottom: 12px;
      }

      .time-row {
        display: flex;
        justify-content: space-between;
        font-size: 1rem;
        font-weight: 700;
        color: #8a4e7d;
        margin-top: 8px;
      }

      #progress {
        width: 100%;
        appearance: none;
        height: 16px;
        border-radius: 999px;
        background: linear-gradient(
          90deg,
          #ff5b97 var(--progress, 0%),
          #ffd3e5 var(--progress, 0%)
        );
        outline: none;
        cursor: pointer;
      }

      #progress::-webkit-slider-thumb {
        appearance: none;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: #fff;
        border: 4px solid var(--primary);
        box-shadow: 0 0 0 3px rgba(255, 79, 139, 0.2);
      }

      #progress::-moz-range-thumb {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        border: 4px solid var(--primary);
        background: #fff;
      }

      .error {
        color: #cf204f;
        font-weight: 700;
        text-align: center;
        min-height: 24px;
      }

      footer {
        margin-top: 12px;
        text-align: center;
        font-size: 1rem;
        font-weight: 700;
        color: #8b4a74;
        letter-spacing: 0.5px;
      }

      @media (max-width: 640px) {
        .player {
          padding: 18px 14px;
        }
        .list {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .jump-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .play-toggle {
          min-width: 150px;
          min-height: 66px;
        }
      }
    </style>
  </head>
  <body>
    <main class="player">
      <h1>Simi 听力小站</h1>
      <p class="hint">二年级下册音频播放魔盒</p>

      <section id="trackList" class="list" aria-label="音频列表"></section>
      <div id="currentTrack" class="current">正在准备音频列表...</div>

      <div class="main-controls">
        <button id="playToggle" class="play-toggle" type="button">
          ▶ 播放
        </button>
      </div>

      <div class="jump-grid" aria-label="快进快退按钮">
        <button class="jump-btn s20" data-jump="-20" type="button">
          ⏪ 后退 20秒
        </button>
        <button class="jump-btn s20" data-jump="20" type="button">
          前进 20秒 ⏩
        </button>
        <button class="jump-btn s10" data-jump="-10" type="button">
          ⏪ 后退 10秒
        </button>
        <button class="jump-btn s10" data-jump="10" type="button">
          前进 10秒 ⏩
        </button>
        <button class="jump-btn s5" data-jump="-5" type="button">
          ⏪ 后退 5秒
        </button>
        <button class="jump-btn s5" data-jump="5" type="button">
          前进 5秒 ⏩
        </button>
        <button class="jump-btn s3" data-jump="-3" type="button">
          ⏪ 后退 3秒
        </button>
        <button class="jump-btn s3" data-jump="3" type="button">
          前进 3秒 ⏩
        </button>
      </div>

      <div class="progress-wrap">
        <input
          id="progress"
          type="range"
          min="0"
          max="1000"
          step="1"
          value="0"
          aria-label="播放进度"
        />
        <div class="time-row">
          <span id="currentTime">00:00</span>
          <span id="duration">00:00</span>
        </div>
      </div>

      <p id="errorMsg" class="error"></p>
      <footer>宝民小学二四班 Simi 创意</footer>
    </main>

    <audio id="audioPlayer" preload="metadata"></audio>

    <script>
      const audio = document.getElementById("audioPlayer");
      const trackListEl = document.getElementById("trackList");
      const currentTrackEl = document.getElementById("currentTrack");
      const playToggle = document.getElementById("playToggle");
      const progress = document.getElementById("progress");
      const currentTimeEl = document.getElementById("currentTime");
      const durationEl = document.getElementById("duration");
      const errorMsg = document.getElementById("errorMsg");

      const tracks = [
        "https://szaudio.centuryenglish.com/szyyaudio/audios/textbook/grade-2B-v2/01%202BUnit%201.mp3",
        "https://szaudio.centuryenglish.com/szyyaudio/audios/textbook/grade-2B-v2/02%202BUnit%202.mp3",
        "https://szaudio.centuryenglish.com/szyyaudio/audios/textbook/grade-2B-v2/03%202BUnit%203.mp3",
        "https://szaudio.centuryenglish.com/szyyaudio/audios/textbook/grade-2B-v2/04%202BUnit%204.mp3",
        "https://szaudio.centuryenglish.com/szyyaudio/audios/textbook/grade-2B-v2/05%202BUnit%205.mp3",
        "https://szaudio.centuryenglish.com/szyyaudio/audios/textbook/grade-2B-v2/06%202BUnit%206.mp3",
        "https://szaudio.centuryenglish.com/szyyaudio/audios/textbook/grade-2B-v2/07%202BProject%201.mp3",
        "https://szaudio.centuryenglish.com/szyyaudio/audios/textbook/grade-2B-v2/08%202BProject%202.mp3",
        "https://szaudio.centuryenglish.com/szyyaudio/audios/textbook/grade-2B-v2/09%202BWord%20list.mp3",
      ];
      let activeIndex = -1;

      function formatTime(sec) {
        if (!Number.isFinite(sec) || sec < 0) return "00:00";
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
      }

      function getTrackName(url) {
        try {
          const fileName = decodeURIComponent(url.split("/").pop() || url);
          return fileName.replace(/\.mp3$/i, "");
        } catch {
          return url;
        }
      }

      function setProgressVisual(value) {
        const percent = (value / Number(progress.max || 1)) * 100;
        progress.style.setProperty("--progress", `${percent}%`);
      }

      function renderTrackList() {
        trackListEl.innerHTML = "";
        tracks.forEach((url, index) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "track-btn";
          btn.textContent = getTrackName(url);
          btn.addEventListener("click", () => selectTrack(index, true));
          trackListEl.appendChild(btn);
        });
        updateActiveTrackStyle();
      }

      function updateActiveTrackStyle() {
        const buttons = trackListEl.querySelectorAll(".track-btn");
        buttons.forEach((btn, idx) =>
          btn.classList.toggle("active", idx === activeIndex),
        );
        if (activeIndex >= 0 && tracks[activeIndex]) {
          currentTrackEl.textContent = `当前音频：${getTrackName(tracks[activeIndex])}`;
        } else {
          currentTrackEl.textContent = "请选择一个音频";
        }
      }

      async function selectTrack(index, autoplay = false) {
        if (index < 0 || index >= tracks.length) return;
        activeIndex = index;
        audio.src = tracks[index];
        progress.value = "0";
        setProgressVisual(0);
        currentTimeEl.textContent = "00:00";
        durationEl.textContent = "00:00";
        updateActiveTrackStyle();
        audio.load();
        if (autoplay) {
          try {
            await audio.play();
          } catch (err) {
            errorMsg.textContent = "浏览器阻止了自动播放，请再按一次播放按钮。";
          }
        }
        refreshPlayButton();
      }

      function refreshPlayButton() {
        playToggle.textContent = audio.paused ? "▶ 播放" : "⏸ 暂停";
      }

      function jump(seconds) {
        if (!audio.src) return;
        const next = Math.min(
          Math.max(audio.currentTime + seconds, 0),
          audio.duration || 0,
        );
        audio.currentTime = next;
      }

      playToggle.addEventListener("click", async () => {
        if (!audio.src && tracks.length) {
          await selectTrack(0, false);
        }
        try {
          if (audio.paused) {
            await audio.play();
          } else {
            audio.pause();
          }
        } catch (err) {
          errorMsg.textContent = "播放失败，请检查网络或链接可用性。";
        }
        refreshPlayButton();
      });

      document.querySelectorAll("[data-jump]").forEach((btn) => {
        btn.addEventListener("click", () =>
          jump(Number(btn.dataset.jump || 0)),
        );
      });

      progress.addEventListener("input", () => {
        if (!audio.duration) return;
        const nextTime =
          (Number(progress.value) / Number(progress.max)) * audio.duration;
        audio.currentTime = nextTime;
        currentTimeEl.textContent = formatTime(audio.currentTime);
        setProgressVisual(Number(progress.value));
      });

      audio.addEventListener("timeupdate", () => {
        if (!audio.duration) return;
        const value =
          (audio.currentTime / audio.duration) * Number(progress.max);
        progress.value = String(
          Math.min(Math.max(value, 0), Number(progress.max)),
        );
        setProgressVisual(Number(progress.value));
        currentTimeEl.textContent = formatTime(audio.currentTime);
      });

      audio.addEventListener("loadedmetadata", () => {
        durationEl.textContent = formatTime(audio.duration);
        currentTimeEl.textContent = formatTime(audio.currentTime);
        setProgressVisual(Number(progress.value));
      });

      audio.addEventListener("play", refreshPlayButton);
      audio.addEventListener("pause", refreshPlayButton);
      audio.addEventListener("ended", refreshPlayButton);

      setProgressVisual(0);
      refreshPlayButton();
      renderTrackList();
      selectTrack(0, false);
      errorMsg.textContent = "";
    </script>
  </body>
</html>
